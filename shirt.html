<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Premium Image Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#07111f;
    color:white;
    overflow-x:hidden;
}

/* HERO */

.hero{
    width:100%;
    min-height:70vh;
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.85)),
    url('https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?q=80&w=1920&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:75px;
    font-weight:800;
}

.hero p{
    margin-top:20px;
    font-size:18px;
    color:#ddd;
}

/* TOP BAR */

.top-bar{
    width:90%;
    max-width:1300px;
    margin:auto;
    margin-top:-50px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    padding:25px;
    display:flex;
    gap:20px;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.search-box{
    flex:1;
}

.search-box input{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:50px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
}

.search-box input::placeholder{
    color:#ccc;
}

.filter-btns{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.filter-btn{
    padding:14px 28px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    transition:0.4s;
    font-weight:600;
}

.filter-btn:hover,
.active{
    background:linear-gradient(135deg,#f8d37b,#d6a84f);
    color:#111;
}

/* GALLERY */

.gallery-section{
    width:90%;
    max-width:1400px;
    margin:70px auto;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

/* CARD */

.card{
    position:relative;
    overflow:hidden;
    border-radius:35px;
    cursor:pointer;
    transition:0.5s;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:420px;
    object-fit:cover;
    transition:0.6s;
}

.card:hover img{
    transform:scale(1.08);
}

/* OVERLAY */

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:25px;
}

.overlay h2{
    font-size:28px;
    margin-bottom:8px;
}

.overlay p{
    color:#ddd;
    line-height:1.6;
}

.badge{
    position:absolute;
    top:20px;
    left:20px;
    background:linear-gradient(135deg,#ff4b2b,#ff416c);
    padding:10px 18px;
    border-radius:50px;
    font-size:14px;
    font-weight:700;
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
    padding:20px;
}

.modal img{
    max-width:90%;
    max-height:90vh;
    border-radius:30px;
}

.close{
    position:absolute;
    top:30px;
    right:40px;
    font-size:45px;
    cursor:pointer;
}

/* FOOTER */

footer{
    text-align:center;
    padding:35px;
    border-top:1px solid rgba(255,255,255,0.08);
    color:#bbb;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
    font-size:48px;
}

.top-bar{
    flex-direction:column;
}

}

</style>
</head>
<body>

<!-- HERO -->

<section class="hero">

<div>

<h1>
Luxury Image Gallery
</h1>

<p>
Explore premium luxury fashion images and stylish collections.
</p>

</div>

</section>

<!-- TOP BAR -->

<section class="top-bar">

<div class="search-box">

<input type="text" id="search" placeholder="Search Luxury Images...">

</div>

<div class="filter-btns">

<button class="filter-btn active" onclick="filterImages('all',this)">
All
</button>

<button class="filter-btn" onclick="filterImages('shirt',this)">
Shirts
</button>

<button class="filter-btn" onclick="filterImages('pant',this)">
Pants
</button>

<button class="filter-btn" onclick="filterImages('fashion',this)">
Fashion
</button>

</div>

</section>

<!-- GALLERY -->

<section class="gallery-section">

<div class="gallery" id="gallery">

<!-- AUTO IMAGES -->

</div>

</section>

<!-- MODAL -->

<div class="modal" id="modal">

<span class="close" onclick="closeModal()">
×
</span>

<img id="modalImg">

</div>

<!-- FOOTER -->

<footer>
© 2026 Luxury Premium Image Gallery
</footer>

<script>

const gallery = document.getElementById("gallery");

const search = document.getElementById("search");

const modal = document.getElementById("modal");

const modalImg = document.getElementById("modalImg");

/* DATA */

const images = [

{
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=900&auto=format&fit=crop",
title:"Luxury White Shirt",
category:"shirt"
},

{
img:"https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=900&auto=format&fit=crop",
title:"Premium Black Shirt",
category:"shirt"
},

{
img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=900&auto=format&fit=crop",
title:"Luxury Brown Pant",
category:"pant"
},

{
img:"https://images.unsplash.com/photo-1490578474895-699cd4e2cf59?q=80&w=900&auto=format&fit=crop",
title:"Men Fashion Style",
category:"fashion"
},

{
img:"https://images.unsplash.com/photo-1523398002811-999ca8dec234?q=80&w=900&auto=format&fit=crop",
title:"Modern White Shirt",
category:"shirt"
},

{
img:"https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=900&auto=format&fit=crop",
title:"Luxury Premium Suit",
category:"fashion"
},

{
img:"https://images.unsplash.com/photo-1514996937319-344454492b37?q=80&w=900&auto=format&fit=crop",
title:"Premium Style Pant",
category:"pant"
},

{
img:"https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=900&auto=format&fit=crop",
title:"Luxury Combo Fashion",
category:"fashion"
}

];

/* SHOW IMAGES */

function displayImages(data){

gallery.innerHTML = "";

data.forEach(item=>{

gallery.innerHTML += `

<div class="card" onclick="openModal('${item.img}')">

<span class="badge">
Luxury
</span>

<img src="${item.img}">

<div class="overlay">

<h2>${item.title}</h2>

<p>
Premium luxury quality fashion image collection.
</p>

</div>

</div>

`;

});

}

/* FILTER */

function filterImages(category,btn){

document.querySelectorAll(".filter-btn")
.forEach(button=>button.classList.remove("active"));

btn.classList.add("active");

if(category === "all"){

displayImages(images);

}else{

const filtered = images.filter(item=>item.category === category);

displayImages(filtered);

}

}

/* SEARCH */

search.addEventListener("keyup",()=>{

const value = search.value.toLowerCase();

const filtered = images.filter(item=>

item.title.toLowerCase().includes(value)

);

displayImages(filtered);

});

/* MODAL */

function openModal(src){

modal.style.display = "flex";

modalImg.src = src;

}

function closeModal(){

modal.style.display = "none";

}

/* CLOSE OUTSIDE */

modal.addEventListener("click",(e)=>{

if(e.target === modal){

closeModal();

}

});

/* DEFAULT */

displayImages(images);

</script>

</body>
</html>
