<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium User Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>


<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow:hidden;
  background:
  linear-gradient(135deg,#0f172a,#111827,#1e293b);
}
  
.home-icon{
    font-size:30px;
    color:white;
    background:#2563eb;
    padding:15px;
    border-radius:60px;
    box-shadow:0 0 20px #2563eb;
    cursor:pointer;
    transition:0.3s;
}

.home-icon:hover{
    transform:scale(1.1);
}

/* BACKGROUND */
.bg1,.bg2,.bg3{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  filter:blur(10px);
  animation:float 8s infinite ease-in-out;
}

.bg1{
  width:250px;
  height:250px;
  top:-80px;
  left:-80px;
}

.bg2{
  width:180px;
  height:180px;
  bottom:-60px;
  right:-60px;
  animation-delay:2s;
}

.bg3{
  width:120px;
  height:120px;
  top:50%;
  left:80%;
  animation-delay:4s;
}

@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(20px);}
  100%{transform:translateY(0px);}
}

/* CARD */
.card{
  position:relative;
  width:100%;
  max-width:430px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:25px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  text-align:center;
  z-index:10;
}

/* PREMIUM BADGE */
.badge{
  position:absolute;
  top:20px;
  right:20px;
  background:gold;
  color:#111;
  padding:6px 14px;
  border-radius:30px;
  font-size:12px;
  font-weight:700;
}

/* PROFILE IMAGE */
.upload-box{
  position:relative;
  width:160px;
  height:160px;
  margin:auto;
}

.profile-img{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid rgba(255,255,255,0.15);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* ONLINE STATUS */
.online{
  position:absolute;
  bottom:10px;
  right:10px;
  width:25px;
  height:25px;
  border-radius:50%;
  background:#00ff88;
  border:4px solid #111827;
}

/* UPLOAD BTN */
.upload-btn{
  position:absolute;
  bottom:-5px;
  left:50%;
  transform:translateX(-50%);
  padding:8px 18px;
  border:none;
  border-radius:30px;
  background:#2563eb;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  margin-top:10px;
}

#fileInput{
  display:none;
}

/* NAME */
h1{
  margin-top:35px;
  color:#fff;
  font-size:30px;
}

.role{
  color:#cbd5e1;
  margin-top:5px;
  font-size:15px;
}

/* INFO BOX */
.info-box{
  margin-top:25px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
}

.info{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.info:last-child{
  border:none;
}

.label{
  color:#94a3b8;
  font-size:14px;
}

.value{
  color:#fff;
  font-weight:500;
  text-align:right;
}

/* BUTTONS */
.buttons{
  margin-top:25px;
  display:flex;
  gap:12px;
}

.btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  font-size:15px;
  font-weight:600;
  transition:0.3s;
}

.call{
  background:#16a34a;
  color:#fff;
}

.whatsapp{
  background:#25D366;
  color:#fff;
}

.share{
  background:#2563eb;
  color:#fff;
}

.btn:hover{
  transform:translateY(-3px);
}

/* SOCIAL */
.social{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.social a{
  width:45px;
  height:45px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.social a:hover{
  transform:translateY(-5px);
  background:#2563eb;
}

/* FOOTER */
.footer{
  margin-top:25px;
  color:#94a3b8;
  font-size:13px;
}

</style>
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="card">

  <div class="badge">PREMIUM</div>

  <!-- PROFILE -->

    <img
      src="IMG_20260519_134639.png"
      id="profileImage"
      class="profile-img"
    >
    <div class="online"></div>
</img>
  <!-- NAME -->
  <h1 id="userName">Ricky ponding</h1>

  <p class="role" id="userRole">
    Frontend Developer
  </p>

  <!-- INFO -->
  <div class="info-box">

    <div class="info">
      <span class="label">Company</span>
      <span class="value" id="company">
         CHANNEI SLIKS CBE -1 
      </span>
    </div>

    <div class="info">
      <span class="label">Location</span>
      <span class="value" id="location">
        Coimbatore . Town hall
      </span>
    </div>

    <div class="info">
      <span class="label">Mobile</span>
      <span class="value" id="mobile">
        +91 8438605207
      </span>
    </div>

    <div class="info">
      <span class="label">Email</span>
      <span class="value">
        rikypondingr@gmail.com
      </span>
    </div>

  </div>

  <!-- BUTTONS -->
  <div class="buttons">

    <button class="btn call"
    onclick="callNow()">
      Call
    </button>

    <button class="btn whatsapp"
    onclick="openWhatsApp()">
      WhatsApp
    </button>

    <button class="btn share"
    onclick="shareProfile()">
      Share
    </button>

  </div>

  <!-- SOCIAL -->
  <div class="social">
    <i class="fa-solid fa-house home-icon"><a href="index.html"></a></i>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    Premium Profile Website © 2026
  </div>

</div>

<script>

/* IMAGE UPLOAD */
const fileInput =
document.getElementById("fileInput");

const profileImage =
document.getElementById("profileImage");

fileInput.addEventListener("change", function(){

  const file = this.files[0];

  if(file){

    const reader = new FileReader();

    reader.onload = function(e){

      profileImage.src = e.target.result;

      localStorage.setItem(
        "profileImage",
        e.target.result
      );
    }

    reader.readAsDataURL(file);
  }
});


/* CALL */
function callNow(){

  window.location.href =
  "tel:+918438605207";
}

/* WHATSAPP */
function openWhatsApp(){

  window.open(
    "https://wa.me/918438605207",
    "_blank"
  );
}

/* SHARE */
function shareProfile(){

  if(navigator.share){

    navigator.share({
      title:"Ricky Profile",
      text:"Check My Premium Profile",
      url:window.location.href
    });

  }else{

    alert("Share Not Supported");
  }
}

</script>

</body>
</html>
